<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金鱼池塘</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a2a1a; }
  canvas { display: block; cursor: none; }
</style>
</head>
<body>
<canvas id="pond"></canvas>
<script>
const canvas = document.getElementById('pond');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── Ripples ─────────────────────────────────────────────────────
const ripples = [];
let mouseX = W / 2, mouseY = H / 2;
let lastRippleTime = 0;

canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  const now = Date.now();
  if (now - lastRippleTime > 60) {
    ripples.push({ x: mouseX, y: mouseY, r: 0, maxR: 80 + Math.random() * 60, alpha: 0.65, speed: 1.8 + Math.random() * 1.2 });
    lastRippleTime = now;
  }
});

canvas.addEventListener('click', e => {
  for (let i = 0; i < 3; i++)
    ripples.push({ x: e.clientX, y: e.clientY, r: i * 12, maxR: 90 + i * 30, alpha: 0.75 - i * 0.1, speed: 2.0 });
});

// ─── Caustics ────────────────────────────────────────────────────
const caustics = Array.from({ length: 30 }, () => ({
  x: Math.random(), y: Math.random(),
  r: 10 + Math.random() * 40,
  phase: Math.random() * Math.PI * 2,
  speed: 0.0003 + Math.random() * 0.0005,
  drift: { x: (Math.random() - 0.5) * 0.0001, y: (Math.random() - 0.5) * 0.0001 },
}));

// ─── Fish ─────────────────────────────────────────────────────────
const FISH_COLORS = [
  { body: '#E8550A', fin: '#FF7A30', belly: '#FFB87A' },
  { body: '#CC2200', fin: '#FF4422', belly: '#FFAA88' },
  { body: '#F5C518', fin: '#FFD966', belly: '#FFF0B0' },
  { body: '#FFFFFF', fin: '#FFE0CC', belly: '#FFFFFF' },
  { body: '#E06020', fin: '#FF8844', belly: '#FFCC99' },
  { body: '#D4A020', fin: '#F5C040', belly: '#FFF0C0' },
  { body: '#CC3300', fin: '#FF5500', belly: '#FFB090' },
  { body: '#F08030', fin: '#FFA050', belly: '#FFD8B0' },
];

class Fish {
  constructor() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.size = 22 + Math.random() * 28;

    // Head angle — what the fish is actually facing
    this.headAngle = Math.random() * Math.PI * 2;
    // Body angle lags behind head (delayed rotation)
    this.bodyAngle = this.headAngle;
    // Tail angle lags even more
    this.tailAngle = this.headAngle;

    this.targetAngle = this.headAngle;
    this.cruiseSpeed = 0.55 + Math.random() * 0.7;
    this.speed = this.cruiseSpeed;

    this.colors = FISH_COLORS[Math.floor(Math.random() * FISH_COLORS.length)];

    // Tail oscillation — higher freq than old version
    this.tailPhase = Math.random() * Math.PI * 2;
    this.tailFreq = 0.10 + Math.random() * 0.06;   // radians/frame
    this.tailAmp = 0.32 + Math.random() * 0.08;

    this.depth = 0.4 + Math.random() * 0.6;
    this.waveOffset = Math.random() * Math.PI * 2;

    // Behaviour state: 'cruise' | 'pause' | 'turn' | 'burst'
    this.state = 'cruise';
    this.stateTimer = 80 + Math.random() * 180;

    this.scared = false;
    this.scaredTimer = 0;

    // History of head positions for body-follows-head spine
    this.spine = Array.from({ length: 8 }, () => ({ x: this.x, y: this.y }));

    this.spots = Math.random() < 0.5 ? Array.from({ length: 2 + Math.floor(Math.random() * 3) }, () => ({
      ox: (Math.random() - 0.2) * 0.6, oy: (Math.random() - 0.5) * 0.5,
      r: 0.08 + Math.random() * 0.12, color: Math.random() < 0.5 ? '#000' : '#fff',
    })) : [];
  }

  scare(cx, cy) {
    const dx = this.x - cx, dy = this.y - cy;
    if (Math.sqrt(dx*dx + dy*dy) < 130) {
      this.scared = true;
      this.scaredTimer = 70 + Math.random() * 60;
      this.targetAngle = Math.atan2(dy, dx) + (Math.random() - 0.5) * 0.9;
      this.speed = 3.2 + Math.random() * 1.8;
      this.state = 'burst';
      this.tailFreq = 0.22 + Math.random() * 0.06;
      this.tailAmp = 0.48;
    }
  }

  _nextState() {
    const roll = Math.random();
    if (roll < 0.55) {
      // cruise — pick new direction gradually
      this.state = 'cruise';
      this.targetAngle = this.headAngle + (Math.random() - 0.5) * Math.PI * 0.8;
      this.speed = this.cruiseSpeed;
      this.stateTimer = 90 + Math.random() * 160;
      this.tailFreq = 0.10 + Math.random() * 0.05;
      this.tailAmp = 0.30 + Math.random() * 0.08;
    } else if (roll < 0.78) {
      // pause + gentle hover
      this.state = 'pause';
      this.speed = 0.08 + Math.random() * 0.1;
      this.stateTimer = 30 + Math.random() * 60;
      this.tailFreq = 0.06;
      this.tailAmp = 0.14;
    } else {
      // sharp turn
      this.state = 'turn';
      this.targetAngle = this.headAngle + (Math.random() < 0.5 ? 1 : -1) * (Math.PI * 0.4 + Math.random() * Math.PI * 0.5);
      this.speed = this.cruiseSpeed * 0.7;
      this.stateTimer = 25 + Math.random() * 35;
      this.tailFreq = 0.13;
      this.tailAmp = 0.38;
    }
  }

  update(t) {
    // State machine
    this.stateTimer--;
    if (this.stateTimer <= 0) {
      if (this.scared) {
        this.scaredTimer--;
        if (this.scaredTimer <= 0) {
          this.scared = false;
          this.cruiseSpeed = 0.55 + Math.random() * 0.7;
          this.tailFreq = 0.10 + Math.random() * 0.06;
          this.tailAmp = 0.32 + Math.random() * 0.08;
        }
      }
      this._nextState();
    }

    // Smoothly steer head toward target
    const turnRate = this.state === 'turn' ? 0.055 : this.state === 'burst' ? 0.09 : 0.032;
    let da = this.targetAngle - this.headAngle;
    while (da > Math.PI) da -= Math.PI * 2;
    while (da < -Math.PI) da += Math.PI * 2;
    this.headAngle += da * turnRate;

    // Body angle lags ~4 frames behind head
    let db = this.headAngle - this.bodyAngle;
    while (db > Math.PI) db -= Math.PI * 2;
    while (db < -Math.PI) db += Math.PI * 2;
    this.bodyAngle += db * 0.22;

    // Accelerate/decelerate smoothly
    const targetSpeed = this.scared ? (3.0 + Math.random() * 0.5) : this.speed;
    this._currentSpeed = this._currentSpeed || this.cruiseSpeed;
    this._currentSpeed += (targetSpeed - this._currentSpeed) * 0.08;

    // Move head
    this.x += Math.cos(this.headAngle) * this._currentSpeed;
    this.y += Math.sin(this.headAngle) * this._currentSpeed;

    // Wrap
    if (this.x < -this.size * 2) this.x = W + this.size;
    if (this.x > W + this.size * 2) this.x = -this.size;
    if (this.y < -this.size * 2) this.y = H + this.size;
    if (this.y > H + this.size * 2) this.y = -this.size;

    // Edge avoidance
    const m = 90;
    if (this.x < m) this.targetAngle = (Math.random() - 0.5) * Math.PI * 0.6;
    if (this.x > W - m) this.targetAngle = Math.PI + (Math.random() - 0.5) * Math.PI * 0.6;
    if (this.y < m) this.targetAngle = Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 0.6;
    if (this.y > H - m) this.targetAngle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 0.6;

    // Push spine — head position history drives body segments
    this.spine.unshift({ x: this.x, y: this.y });
    if (this.spine.length > 8) this.spine.pop();

    // Tail oscillation advances with speed
    this.tailPhase += this.tailFreq * (this._currentSpeed / this.cruiseSpeed);
  }

  draw() {
    const s = this.size * this.depth;
    const a = 0.65 + this.depth * 0.35;

    // Everything drawn from head position, rotated by bodyAngle
    // (bodyAngle lags headAngle to give delayed-body feel)
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.bodyAngle);
    ctx.globalAlpha = a;

    // Shadow
    ctx.save();
    ctx.translate(s*0.1, s*0.18); ctx.scale(1, 0.28);
    const sg = ctx.createRadialGradient(0,0,0,0,0,s);
    sg.addColorStop(0,'rgba(0,0,0,0.22)'); sg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = sg;
    ctx.beginPath(); ctx.ellipse(0,0,s,s*0.5,0,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // Body — center at (s*0.05, 0), rear edge at -s*0.67
    const bg = ctx.createRadialGradient(-s*0.1,-s*0.14,s*0.05,0,0,s*0.7);
    bg.addColorStop(0, this.colors.belly);
    bg.addColorStop(0.45, this.colors.body);
    bg.addColorStop(1, this.colors.fin);
    ctx.globalAlpha = a;
    ctx.beginPath(); ctx.ellipse(s*0.05, 0, s*0.72, s*0.32, 0, 0, Math.PI*2);
    ctx.fillStyle = bg; ctx.fill();

    // Tail — attached at rear edge of body ellipse (center s*0.05, half-width s*0.72 → rear at -s*0.67)
    const tw = Math.sin(this.tailPhase) * this.tailAmp;
    ctx.save();
    ctx.translate(-s*0.67, 0);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(-s*0.48, -s*0.58+tw*s, -s*0.8, -s*0.48+tw*s*1.6, -s*0.98, tw*s*2.1);
    ctx.bezierCurveTo(-s*0.8, s*0.48+tw*s, -s*0.48, s*0.58+tw*s, 0, 0);
    ctx.fillStyle = this.colors.fin; ctx.globalAlpha = a*0.85; ctx.fill();
    ctx.restore();

    // Pectoral fin — beats slightly with tail
    ctx.save();
    ctx.translate(s*0.1, s*0.24);
    ctx.rotate(Math.PI/4 + tw * 0.55);
    ctx.beginPath(); ctx.ellipse(0,0,s*0.34,s*0.14,0,0,Math.PI*2);
    ctx.fillStyle = this.colors.fin; ctx.globalAlpha = a*0.7; ctx.fill();
    ctx.restore();

    // Dorsal fin
    ctx.save();
    ctx.translate(s*0.1, -s*0.29);
    ctx.beginPath(); ctx.moveTo(-s*0.3,0); ctx.bezierCurveTo(0,-s*0.34,s*0.2,-s*0.3,s*0.3,0);
    ctx.fillStyle = this.colors.fin; ctx.globalAlpha = a*0.7; ctx.fill();
    ctx.restore();

    // Body highlight (belly shimmer, shifts with tail)
    ctx.globalAlpha = a * 0.18;
    ctx.fillStyle = this.colors.belly;
    ctx.beginPath();
    ctx.ellipse(s*0.1 + tw*s*0.15, -s*0.1, s*0.26, s*0.1, tw*0.35, 0, Math.PI*2);
    ctx.fill();

    // Scale shimmer
    ctx.globalAlpha = a*0.14; ctx.strokeStyle = '#fff'; ctx.lineWidth = 0.8;
    for (let i=0;i<3;i++) { ctx.beginPath(); ctx.ellipse(s*(0.4-i*0.35),0,s*0.27,s*0.21,0,0,Math.PI*2); ctx.stroke(); }

    // Spots
    for (const sp of this.spots) {
      ctx.beginPath(); ctx.ellipse(s*sp.ox,s*sp.oy,s*sp.r,s*sp.r*0.8,0,0,Math.PI*2);
      ctx.fillStyle = sp.color; ctx.globalAlpha = a*0.7; ctx.fill();
    }

    // Eye
    ctx.globalAlpha = a;
    ctx.beginPath(); ctx.arc(s*0.54,-s*0.1,s*0.07,0,Math.PI*2); ctx.fillStyle='#111'; ctx.fill();
    ctx.beginPath(); ctx.arc(s*0.56,-s*0.12,s*0.025,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();

    ctx.restore();
  }
}

const fishes = Array.from({ length: 18 }, () => new Fish());

canvas.addEventListener('mousemove', e => {
  fishes.forEach(f => {
    const dx = f.x-e.clientX, dy = f.y-e.clientY;
    if (Math.sqrt(dx*dx+dy*dy) < 65) f.scare(e.clientX, e.clientY);
  });
});
canvas.addEventListener('click', e => fishes.forEach(f => f.scare(e.clientX, e.clientY)));

// ─── Water ───────────────────────────────────────────────────────
function drawWater(t) {
  const bg = ctx.createLinearGradient(0, 0, W*0.3, H);
  bg.addColorStop(0, '#0d3a3a');
  bg.addColorStop(0.3, '#0e4a3a');
  bg.addColorStop(0.6, '#0d3d30');
  bg.addColorStop(1, '#091e18');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  for (const c of caustics) {
    c.x += c.drift.x; c.y += c.drift.y;
    if (c.x < 0) c.x = 1; if (c.x > 1) c.x = 0;
    if (c.y < 0) c.y = 1; if (c.y > 1) c.y = 0;
    const cx = c.x*W, cy = c.y*H;
    const al = 0.03 + 0.025*Math.sin(t*c.speed*1000+c.phase);
    const r = c.r*(0.8+0.4*Math.sin(t*c.speed*800+c.phase));
    const cg = ctx.createRadialGradient(cx,cy,0,cx,cy,r);
    cg.addColorStop(0,`rgba(120,220,190,${al})`); cg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = cg; ctx.fillRect(cx-r,cy-r,r*2,r*2);
  }
}

// ─── Ripples ─────────────────────────────────────────────────────
function drawRipples() {
  for (let i = ripples.length-1; i >= 0; i--) {
    const rp = ripples[i];
    rp.r += rp.speed; rp.alpha *= 0.965;
    if (rp.alpha < 0.005 || rp.r > rp.maxR) { ripples.splice(i,1); continue; }
    ctx.save();
    ctx.globalAlpha = rp.alpha;
    ctx.strokeStyle = 'rgba(180,240,230,0.9)';
    ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.ellipse(rp.x,rp.y,rp.r,rp.r*0.38,0,0,Math.PI*2); ctx.stroke();
    if (rp.r > 15) {
      ctx.globalAlpha = rp.alpha*0.5;
      ctx.beginPath(); ctx.ellipse(rp.x,rp.y,rp.r*0.65,rp.r*0.65*0.38,0,0,Math.PI*2); ctx.stroke();
    }
    ctx.restore();
  }
}

// ─── Surface shimmer ─────────────────────────────────────────────
function drawSurface(t) {
  ctx.save();
  for (let i = 0; i < 8; i++) {
    const yFrac = (i/8 + t*0.00003*(i%2===0?1:-0.7)) % 1;
    const y = yFrac*H;
    ctx.globalAlpha = 0.015 + 0.015*Math.sin(t*0.0002+i);
    ctx.strokeStyle = 'rgba(200,240,230,0.8)';
    ctx.lineWidth = 0.8 + Math.sin(t*0.0003+i*0.5)*0.4;
    ctx.beginPath(); ctx.moveTo(0,y);
    for (let x=0;x<W;x+=4) ctx.lineTo(x, y+Math.sin(x*0.04+t*0.001+i)*2);
    ctx.stroke();
  }
  ctx.restore();
}

// ─── Cursor ──────────────────────────────────────────────────────
function drawCursor(x, y, t) {
  ctx.save();
  const pulse = 0.7 + 0.3*Math.sin(t*0.06);
  ctx.globalAlpha = 0.6*pulse;
  ctx.strokeStyle = 'rgba(255,255,255,0.8)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(x,y,10,0,Math.PI*2); ctx.stroke();
  ctx.globalAlpha = 0.3*pulse;
  ctx.beginPath(); ctx.arc(x,y,18,0,Math.PI*2); ctx.stroke();
  ctx.restore();
}

// ─── Main loop ───────────────────────────────────────────────────
let t = 0;
function loop() {
  t++;
  ctx.clearRect(0, 0, W, H);
  drawWater(t);
  fishes.forEach(f => f.update(t));
  fishes.sort((a,b) => a.depth - b.depth);
  fishes.forEach(f => f.draw());
  drawRipples();
  drawSurface(t);
  drawCursor(mouseX, mouseY, t);
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
